<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UAV Aero Workbench</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --border: #243049;
      --text: #e8eef9;
      --muted: #8fa3c4;
      --accent: #3b9eff;
      --accent2: #22d3a6;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, #1a2d52 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }
    h1 { margin: 0; font-size: 1.35rem; font-weight: 600; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem; }
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1rem;
      padding: 1rem 1.5rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.1rem;
    }
    label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input, select {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0d1526;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.25rem;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .check { display: flex; align-items: center; gap: 0.5rem; margin: 0.5rem 0 0.75rem; }
    .check input { width: auto; margin: 0; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .stat {
      background: #0d1526;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
    }
    .stat .v { font-size: 1.35rem; font-weight: 700; color: var(--accent2); }
    .stat .k { font-size: 0.75rem; color: var(--muted); }
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 1100px) { .charts { grid-template-columns: 1fr; } }
    .chart-box {
      background: #0d1526;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
      min-height: 280px;
    }
    .chart-box h3 { margin: 0 0 0.5rem; font-size: 0.95rem; font-weight: 600; }
    .status {
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .status.show { display: block; }
    .status.ok { background: #0f2a22; border: 1px solid #1f6f55; color: #86efca; }
    .status.err { background: #2a1212; border: 1px solid #7f2d2d; color: #fca5a5; }
    .status.busy { background: #1a2238; border: 1px solid var(--border); color: var(--muted); }
    .api-link { font-size: 0.8rem; color: var(--muted); word-break: break-all; }
    .api-link a { color: var(--accent); }
    .hidden { display: none; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { border-bottom: 1px solid var(--border); padding: 0.45rem; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>UAV Aero Workbench</h1>
      <div class="subtitle">OpenVSP + VSPAero via FastAPI on Railway</div>
    </div>
    <div class="api-link">API: <a id="apiLink" href="#" target="_blank" rel="noopener"></a></div>
  </header>

  <div class="layout">
    <aside class="panel">
      <label for="apiBase">API base URL</label>
      <input id="apiBase" type="url" placeholder="https://openvsp-api-production.up.railway.app" />

      <label for="vehicle">UAV model</label>
      <select id="vehicle"></select>

      <div id="geomFields"></div>

      <hr style="border-color:var(--border);margin:1rem 0" />
      <div class="row2">
        <div>
          <label for="mach">Mach</label>
          <input id="mach" type="number" step="0.01" />
        </div>
        <div>
          <label for="re">Reynolds</label>
          <input id="re" type="number" step="1000" />
        </div>
      </div>
      <div class="row2">
        <div>
          <label for="alphaStart">α start (°)</label>
          <input id="alphaStart" type="number" step="0.5" />
        </div>
        <div>
          <label for="alphaEnd">α end (°)</label>
          <input id="alphaEnd" type="number" step="0.5" />
        </div>
      </div>
      <label for="alphaStep">α step (°)</label>
      <input id="alphaStep" type="number" step="0.5" />

      <div class="check">
        <input id="runVspaero" type="checkbox" checked />
        <label for="runVspaero" style="margin:0;text-transform:none;letter-spacing:0">Run VSPAero analysis</label>
      </div>

      <button id="runBtn">Run analysis</button>
    </aside>

    <main>
      <div id="status" class="status"></div>
      <div class="stats hidden" id="stats"></div>
      <div class="charts hidden" id="charts">
        <div class="chart-box"><h3>Lift curve — CL vs α</h3><canvas id="chartCl"></canvas></div>
        <div class="chart-box"><h3>Drag curve — CD vs α</h3><canvas id="chartCd"></canvas></div>
        <div class="chart-box"><h3>Efficiency — L/D vs α</h3><canvas id="chartLd"></canvas></div>
        <div class="chart-box"><h3>Drag polar — CD vs CL</h3><canvas id="chartPolar"></canvas></div>
      </div>
      <div class="panel hidden" id="tablePanel" style="margin-top:1rem">
        <h3 style="margin-top:0">Polar data</h3>
        <table>
          <thead><tr><th>α (°)</th><th>CL</th><th>CD</th><th>L/D</th></tr></thead>
          <tbody id="polarBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const DEFAULT_API = "https://openvsp-api-production.up.railway.app";
    const FIELD_META = {
      span: { label: "Wing span (m)", step: "0.01", placeholder: "e.g. 4.0" },
      rootChord: { label: "Root chord (m)", step: "0.01", placeholder: "e.g. 0.5" },
      tipChord: { label: "Tip chord (m)", step: "0.01", placeholder: "e.g. 0.25" },
      outerRootChord: { label: "Outer root chord (m)", step: "0.01", placeholder: "" },
      outerTipChord: { label: "Outer tip chord (m)", step: "0.01", placeholder: "" },
    };

    let models = [];
    let charts = {};

    const $ = (id) => document.getElementById(id);

    function apiBase() {
      const v = $("apiBase").value.trim().replace(/\/$/, "");
      return v || window.location.origin;
    }

    function setStatus(msg, type) {
      const el = $("status");
      el.textContent = msg;
      el.className = "status show " + type;
    }

    function chartDefaults() {
      return {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: "#243049" }, ticks: { color: "#8fa3c4" } },
          y: { grid: { color: "#243049" }, ticks: { color: "#8fa3c4" } },
        },
      };
    }

    function destroyCharts() {
      Object.values(charts).forEach((c) => c.destroy());
      charts = {};
    }

    function renderGeomFields(model) {
      const wrap = $("geomFields");
      wrap.innerHTML = "";
      (model.parameters || []).forEach((key) => {
        const meta = FIELD_META[key] || { label: key, step: "0.01", placeholder: "" };
        const div = document.createElement("div");
        div.innerHTML = `
          <label for="f_${key}">${meta.label}</label>
          <input id="f_${key}" type="number" step="${meta.step}" placeholder="${meta.placeholder}" />
        `;
        wrap.appendChild(div);
      });
    }

    function applyDefaults(model) {
      const d = model.defaults || {};
      $("mach").value = d.mach ?? 0.15;
      $("re").value = d.re ?? 1e6;
      $("alphaStart").value = d.alphaStart ?? 0;
      $("alphaEnd").value = d.alphaEnd ?? 12;
      $("alphaStep").value = d.alphaStep ?? 2;
    }

    function buildPayload() {
      const vehicle = $("vehicle").value;
      const model = models.find((m) => m.id === vehicle);
      const body = {
        vehicle,
        mach: parseFloat($("mach").value),
        alphaStart: parseFloat($("alphaStart").value),
        alphaEnd: parseFloat($("alphaEnd").value),
        alphaStep: parseFloat($("alphaStep").value),
        re: parseFloat($("re").value),
        runVspaero: $("runVspaero").checked,
      };
      (model?.parameters || []).forEach((key) => {
        const v = parseFloat($(`f_${key}`)?.value);
        if (!Number.isNaN(v)) body[key] = v;
      });
      return body;
    }

    function renderResults(data) {
      const polar = data.polar || [];
      const perf = data.performance || {};

      $("stats").innerHTML = `
        <div class="stat"><div class="k">Vehicle</div><div class="v" style="font-size:1rem">${data.vehicle}</div></div>
        <div class="stat"><div class="k">L/D max</div><div class="v">${perf.ld_max != null ? perf.ld_max.toFixed(2) : "—"}</div></div>
        <div class="stat"><div class="k">CL @ L/D max</div><div class="v">${perf.cl_at_ld_max != null ? perf.cl_at_ld_max.toFixed(3) : "—"}</div></div>
        <div class="stat"><div class="k">CD @ L/D max</div><div class="v">${perf.cd_at_ld_max != null ? perf.cd_at_ld_max.toFixed(4) : "—"}</div></div>
        <div class="stat"><div class="k">Polar points</div><div class="v">${polar.length}</div></div>
      `;
      $("stats").classList.remove("hidden");

      const tbody = $("polarBody");
      tbody.innerHTML = polar.map((r) => {
        const ld = r.cd ? (r.cl / r.cd).toFixed(2) : "—";
        return `<tr><td>${r.alpha}</td><td>${r.cl.toFixed(4)}</td><td>${r.cd.toFixed(5)}</td><td>${ld}</td></tr>`;
      }).join("");
      $("tablePanel").classList.toggle("hidden", polar.length === 0);

      if (!polar.length) {
        $("charts").classList.add("hidden");
        setStatus("Analysis finished but no polar data returned. Try runVspaero or check OpenVSP logs.", "ok");
        return;
      }

      const alphas = polar.map((r) => r.alpha);
      const cls = polar.map((r) => r.cl);
      const cds = polar.map((r) => r.cd);
      const lds = polar.map((r) => (r.cd ? r.cl / r.cd : 0));

      destroyCharts();
      $("charts").classList.remove("hidden");

      charts.polar = new Chart($("chartPolar"), {
        type: "line",
        data: { labels: alphas, datasets: [{ data: cls, borderColor: "#3b9eff", tension: 0.25, pointRadius: 4 }] },
        options: { ...chartDefaults(), scales: { ...chartDefaults().scales, x: { ...chartDefaults().scales.x, title: { display: true, text: "α (deg)", color: "#8fa3c4" } }, y: { ...chartDefaults().scales.y, title: { display: true, text: "CL", color: "#8fa3c4" } } } },
      });

      charts.cd = new Chart($("chartCd"), {
        type: "line",
        data: { labels: alphas, datasets: [{ data: cds, borderColor: "#f59e0b", tension: 0.25, pointRadius: 4 }] },
        options: { ...chartDefaults(), scales: { ...chartDefaults().scales, x: { ...chartDefaults().scales.x, title: { display: true, text: "α (deg)", color: "#8fa3c4" } }, y: { ...chartDefaults().scales.y, title: { display: true, text: "CD", color: "#8fa3c4" } } } },
      });

      charts.ld = new Chart($("chartLd"), {
        type: "line",
        data: { labels: alphas, datasets: [{ data: lds, borderColor: "#22d3a6", tension: 0.25, pointRadius: 4 }] },
        options: { ...chartDefaults(), scales: { ...chartDefaults().scales, x: { ...chartDefaults().scales.x, title: { display: true, text: "α (deg)", color: "#8fa3c4" } }, y: { ...chartDefaults().scales.y, title: { display: true, text: "L/D", color: "#8fa3c4" } } } },
      });

      charts.polar = new Chart($("chartPolar"), {
        type: "scatter",
        data: { datasets: [{ data: cls.map((cl, i) => ({ x: cl, y: cds[i] })), borderColor: "#a78bfa", backgroundColor: "#a78bfa", showLine: true, tension: 0.25, pointRadius: 4 }] },
        options: {
          ...chartDefaults(),
          scales: {
            x: { ...chartDefaults().scales.x, title: { display: true, text: "CL", color: "#8fa3c4" } },
            y: { ...chartDefaults().scales.y, title: { display: true, text: "CD", color: "#8fa3c4" } },
          },
        },
      });

      setStatus(`Done — case ${data.case_name}`, "ok");
    }

    async function loadModels() {
      const base = apiBase();
      $("apiLink").href = base + "/docs";
      $("apiLink").textContent = base;

      const res = await fetch(base + "/api/models");
      if (!res.ok) throw new Error("Failed to load models (" + res.status + ")");
      models = await res.json();

      const sel = $("vehicle");
      sel.innerHTML = models.map((m) => `<option value="${m.id}">${m.label}</option>`).join("");

      const onChange = () => {
        const m = models.find((x) => x.id === sel.value);
        if (m) { renderGeomFields(m); applyDefaults(m); }
      };
      sel.onchange = onChange;
      onChange();
    }

    async function runAnalysis() {
      const base = apiBase();
      const btn = $("runBtn");
      btn.disabled = true;
      setStatus("Running OpenVSP analysis — this may take 1–5 minutes…", "busy");

      try {
        const res = await fetch(base + "/api/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(buildPayload()),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || res.statusText || "Request failed");
        renderResults(data);
      } catch (err) {
        setStatus(err.message || String(err), "err");
      } finally {
        btn.disabled = false;
      }
    }

    $("apiBase").value = window.location.origin.includes("localhost") ? DEFAULT_API : window.location.origin;
    $("runBtn").onclick = runAnalysis;

    loadModels().catch((e) => setStatus("Could not reach API: " + e.message, "err"));
  </script>
</body>
</html>
