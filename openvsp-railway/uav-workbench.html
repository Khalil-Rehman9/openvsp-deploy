<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UAV Aero Workbench (Local)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --border: #243049;
      --text: #e8eef9;
      --muted: #8fa3c4;
      --accent: #3b9eff;
      --accent2: #22d3a6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, #1a2d52 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }
    h1 { margin: 0; font-size: 1.35rem; font-weight: 600; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem; }
    .badge {
      display: inline-block;
      background: #1e3a5f;
      color: #93c5fd;
      font-size: 0.72rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      margin-left: 0.5rem;
    }
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1rem;
      padding: 1rem 1.5rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.1rem;
    }
    label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input, select {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0d1526;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.25rem;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .check { display: flex; align-items: center; gap: 0.5rem; margin: 0.5rem 0 0.75rem; }
    .check input { width: auto; margin: 0; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .stat {
      background: #0d1526;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
    }
    .stat .v { font-size: 1.35rem; font-weight: 700; color: var(--accent2); }
    .stat .k { font-size: 0.75rem; color: var(--muted); }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 1100px) { .charts { grid-template-columns: 1fr; } }
    .chart-box {
      background: #0d1526;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
      height: 300px;
    }
    .chart-box h3 { margin: 0 0 0.5rem; font-size: 0.95rem; }
    .status {
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .status.show { display: block; }
    .status.ok { background: #0f2a22; border: 1px solid #1f6f55; color: #86efca; }
    .status.err { background: #2a1212; border: 1px solid #7f2d2d; color: #fca5a5; }
    .status.busy { background: #1a2238; border: 1px solid var(--border); color: var(--muted); }
    .api-link { font-size: 0.8rem; color: var(--muted); word-break: break-all; }
    .api-link a { color: var(--accent); }
    .hidden { display: none; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { border-bottom: 1px solid var(--border); padding: 0.45rem; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>UAV Aero Workbench <span class="badge">LOCAL HTML</span></h1>
      <div class="subtitle">Open this file in your browser — data goes to Railway FastAPI</div>
    </div>
    <div class="api-link">API: <a id="apiLink" href="https://openvsp-api-production.up.railway.app/docs" target="_blank" rel="noopener">https://openvsp-api-production.up.railway.app</a></div>
  </header>

  <div class="layout">
    <aside class="panel">
      <label for="apiBase">API base URL</label>
      <input id="apiBase" type="url" value="https://openvsp-api-production.up.railway.app" />

      <label for="vehicle">UAV model</label>
      <select id="vehicle"></select>
      <div id="geomFields"></div>

      <hr style="border-color:var(--border);margin:1rem 0" />
      <div class="row2">
        <div><label for="mach">Mach</label><input id="mach" type="number" step="0.01" /></div>
        <div><label for="re">Reynolds</label><input id="re" type="number" step="1000" /></div>
      </div>
      <div class="row2">
        <div><label for="alphaStart">α start (°)</label><input id="alphaStart" type="number" step="0.5" /></div>
        <div><label for="alphaEnd">α end (°)</label><input id="alphaEnd" type="number" step="0.5" /></div>
      </div>
      <label for="alphaStep">α step (°)</label>
      <input id="alphaStep" type="number" step="0.5" />
      <div class="check">
        <input id="runVspaero" type="checkbox" checked />
        <label for="runVspaero" style="margin:0;text-transform:none">Run VSPAero</label>
      </div>
      <button id="runBtn">Run analysis</button>
    </aside>

    <main>
      <div id="status" class="status"></div>
      <div class="stats hidden" id="stats"></div>
      <div class="charts hidden" id="charts">
        <div class="chart-box"><h3>CL vs α</h3><canvas id="chartCl"></canvas></div>
        <div class="chart-box"><h3>CD vs α</h3><canvas id="chartCd"></canvas></div>
        <div class="chart-box"><h3>L/D vs α</h3><canvas id="chartLd"></canvas></div>
        <div class="chart-box"><h3>Drag polar</h3><canvas id="chartPolar"></canvas></div>
      </div>
      <div class="panel hidden" id="tablePanel" style="margin-top:1rem">
        <h3 style="margin-top:0">Polar data</h3>
        <table><thead><tr><th>α</th><th>CL</th><th>CD</th><th>L/D</th></tr></thead><tbody id="polarBody"></tbody></table>
      </div>
    </main>
  </div>

  <script>
    const DEFAULT_API = "https://openvsp-api-production.up.railway.app";
    const FIELD_META = {
      span: { label: "Wing span (m)", step: "0.01", placeholder: "4.0" },
      rootChord: { label: "Root chord (m)", step: "0.01", placeholder: "0.5" },
      tipChord: { label: "Tip chord (m)", step: "0.01", placeholder: "0.25" },
      outerRootChord: { label: "Outer root chord (m)", step: "0.01" },
      outerTipChord: { label: "Outer tip chord (m)", step: "0.01" },
    };
    let models = [], charts = {};
    const $ = (id) => document.getElementById(id);

    function apiBase() {
      const v = $("apiBase").value.trim().replace(/\/$/, "");
      return v || DEFAULT_API;
    }

    function setStatus(msg, type) {
      const el = $("status");
      el.textContent = msg;
      el.className = "status show " + type;
    }

    function chartDefaults() {
      return {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: "#243049" }, ticks: { color: "#8fa3c4" } },
          y: { grid: { color: "#243049" }, ticks: { color: "#8fa3c4" } },
        },
      };
    }

    function destroyCharts() { Object.values(charts).forEach((c) => c.destroy()); charts = {}; }

    function renderGeomFields(model) {
      $("geomFields").innerHTML = "";
      (model.parameters || []).forEach((key) => {
        const m = FIELD_META[key] || { label: key, step: "0.01", placeholder: "" };
        const d = document.createElement("div");
        d.innerHTML = `<label for="f_${key}">${m.label}</label><input id="f_${key}" type="number" step="${m.step}" placeholder="${m.placeholder || ""}" />`;
        $("geomFields").appendChild(d);
      });
    }

    function applyDefaults(model) {
      const d = model.defaults || {};
      $("mach").value = d.mach ?? 0.15;
      $("re").value = d.re ?? 1e6;
      $("alphaStart").value = d.alphaStart ?? 0;
      $("alphaEnd").value = d.alphaEnd ?? 12;
      $("alphaStep").value = d.alphaStep ?? 2;
    }

    function buildPayload() {
      const vehicle = $("vehicle").value;
      const model = models.find((m) => m.id === vehicle);
      const body = {
        vehicle,
        mach: +$("mach").value,
        alphaStart: +$("alphaStart").value,
        alphaEnd: +$("alphaEnd").value,
        alphaStep: +$("alphaStep").value,
        re: +$("re").value,
        runVspaero: $("runVspaero").checked,
      };
      (model?.parameters || []).forEach((key) => {
        const v = +$(`f_${key}`)?.value;
        if (!Number.isNaN(v)) body[key] = v;
      });
      return body;
    }

    function renderResults(data) {
      const polar = data.polar || [];
      const perf = data.performance || {};
      $("stats").innerHTML = `
        <div class="stat"><div class="k">Vehicle</div><div class="v" style="font-size:1rem">${data.vehicle}</div></div>
        <div class="stat"><div class="k">L/D max</div><div class="v">${perf.ld_max != null ? perf.ld_max.toFixed(2) : "—"}</div></div>
        <div class="stat"><div class="k">CL @ L/D max</div><div class="v">${perf.cl_at_ld_max?.toFixed(3) ?? "—"}</div></div>
        <div class="stat"><div class="k">CD @ L/D max</div><div class="v">${perf.cd_at_ld_max?.toFixed(4) ?? "—"}</div></div>
        <div class="stat"><div class="k">Points</div><div class="v">${polar.length}</div></div>`;
      $("stats").classList.remove("hidden");
      $("polarBody").innerHTML = polar.map((r) =>
        `<tr><td>${r.alpha}</td><td>${r.cl.toFixed(4)}</td><td>${r.cd.toFixed(5)}</td><td>${r.cd ? (r.cl/r.cd).toFixed(2) : "—"}</td></tr>`
      ).join("");
      $("tablePanel").classList.toggle("hidden", !polar.length);
      if (!polar.length) { $("charts").classList.add("hidden"); setStatus("No polar data — try with VSPAero enabled.", "ok"); return; }

      const alphas = polar.map((r) => r.alpha);
      const cls = polar.map((r) => r.cl);
      const cds = polar.map((r) => r.cd);
      const lds = polar.map((r) => (r.cd ? r.cl / r.cd : 0));
      destroyCharts();
      $("charts").classList.remove("hidden");
      const ax = (xl, yl) => ({ ...chartDefaults(), scales: {
        x: { ...chartDefaults().scales.x, title: { display: true, text: xl, color: "#8fa3c4" } },
        y: { ...chartDefaults().scales.y, title: { display: true, text: yl, color: "#8fa3c4" } },
      }});
      charts.cl = new Chart($("chartCl"), { type: "line", data: { labels: alphas, datasets: [{ data: cls, borderColor: "#3b9eff", tension: 0.25 }] }, options: ax("α (°)", "CL") });
      charts.cd = new Chart($("chartCd"), { type: "line", data: { labels: alphas, datasets: [{ data: cds, borderColor: "#f59e0b", tension: 0.25 }] }, options: ax("α (°)", "CD") });
      charts.ld = new Chart($("chartLd"), { type: "line", data: { labels: alphas, datasets: [{ data: lds, borderColor: "#22d3a6", tension: 0.25 }] }, options: ax("α (°)", "L/D") });
      charts.polar = new Chart($("chartPolar"), {
        type: "scatter",
        data: { datasets: [{ data: cls.map((cl, i) => ({ x: cl, y: cds[i] })), borderColor: "#a78bfa", showLine: true, tension: 0.25 }] },
        options: ax("CL", "CD"),
      });
      setStatus("Done — " + data.case_name, "ok");
    }

    async function loadModels() {
      const base = apiBase();
      const res = await fetch(base + "/api/models");
      if (!res.ok) throw new Error("API error " + res.status + " — is Railway running?");
      models = await res.json();
      $("vehicle").innerHTML = models.map((m) => `<option value="${m.id}">${m.label}</option>`).join("");
      const onChange = () => { const m = models.find((x) => x.id === $("vehicle").value); if (m) { renderGeomFields(m); applyDefaults(m); } };
      $("vehicle").onchange = onChange;
      onChange();
      setStatus("Connected to API. Pick a model and run analysis.", "ok");
    }

    $("runBtn").onclick = async () => {
      $("runBtn").disabled = true;
      setStatus("Running OpenVSP… (1–5 min)", "busy");
      try {
        const res = await fetch(apiBase() + "/api/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(buildPayload()),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail) || res.statusText);
        renderResults(data);
      } catch (e) { setStatus(e.message, "err"); }
      finally { $("runBtn").disabled = false; }
    };

    loadModels().catch((e) => setStatus(e.message, "err"));
  </script>
</body>
</html>
